<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Registro de Comercio · V+ Puntos</title>

  <meta name="theme-color" content="#09090b" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Registro para nuevos comercios en V+ Puntos" />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" href="/icons/icon-v2.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />

  <style>
    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #09090b;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .loginPage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 80% 70%, rgba(139, 92, 246, 0.10) 0%, transparent 70%),
        #09090b;
    }

    .loginCard {
      width: min(420px, 100%);
      background: #111113;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 24px;
      padding: 40px 32px 44px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04),
        0 32px 80px rgba(0, 0, 0, 0.7),
        0 4px 16px rgba(0, 0, 0, 0.4);
      animation: cardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      position: relative;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .loginCard__logo {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .loginCard__logoCircle {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.22) 0%, rgba(139, 92, 246, 0.15) 100%);
      border: 1px solid rgba(99, 102, 241, 0.3);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.2);
    }

    .loginCard__title {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      letter-spacing: -0.4px;
    }

    .loginCard__sub {
      margin: 0 0 32px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.38);
      text-align: center;
    }

    .loginForm {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .loginField {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .loginField__label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .loginField__input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 14px 16px;
      color: #fff;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      transition: border-color 150ms, box-shadow 150ms, background 150ms;
      box-sizing: border-box;
    }

    .loginField__input:focus {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
    }

    .loginBtn {
      margin-top: 4px;
      width: 100%;
      padding: 15px 20px;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 140ms, transform 100ms;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
    }

    .loginBtn:hover { opacity: 0.92; }
    .loginBtn:active { transform: scale(0.98); }
    .loginBtn:disabled { opacity: 0.55; cursor: not-allowed; }

    .loginResult {
      min-height: 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.38);
      text-align: center;
      line-height: 1.4;
    }

    .loginResult--ok { color: #4ade80; }
    .loginResult--err { color: #f87171; }
    .loginResult--info { color: #60a5fa; }

    .loginCard__loader {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: rgba(17, 17, 19, 0.7);
      backdrop-filter: blur(2px);
      place-items: center;
    }

    .loginCard__loader.is-visible { display: grid; }
    .loginCard__spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loginCard__brand {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.18);
    }
  </style>
</head>

<body>
  <div class="loginPage">
    <div class="loginCard" id="setupCard">

      <div class="loginCard__logo">
        <div class="loginCard__logoCircle">
          <img src="/icons/icon-v2.svg" width="28" height="28" alt="Logo" style="object-fit: contain;" />
        </div>
      </div>

      <h1 class="loginCard__title">Registro</h1>
      <p class="loginCard__sub" id="merchantNameDisplay">Cargando...</p>

      <div id="errorContainer" hidden style="text-align: center; padding: 20px;">
        <p class="loginResult loginResult--err" id="errorMessage"></p>
      </div>

      <!-- Paso 1: Datos del Comercio -->
      <form class="loginForm" id="setupForm" autocomplete="off" novalidate hidden>
        <div class="loginField">
          <label class="loginField__label" for="username">Usuario para Acceder</label>
          <input class="loginField__input" id="username" name="username" type="text" placeholder="Ej: micomercio" required />
        </div>

        <div class="loginField">
          <label class="loginField__label" for="password">Contraseña</label>
          <input class="loginField__input" id="password" name="password" type="password" placeholder="Mínimo 6 caracteres" required />
        </div>
        
        <div class="loginField">
          <label class="loginField__label" for="branchName">Nombre de la Sede</label>
          <input class="loginField__input" id="branchName" name="branchName" type="text" placeholder="Ej: Principal / Sambil" required />
        </div>

        <button class="loginBtn" id="setupBtn" type="submit">Continuar</button>
        <div class="loginResult" id="setupResult" aria-live="polite"></div>
      </form>

      <!-- Paso 2: Validación OTP -->
      <form class="loginForm" id="otpForm" autocomplete="off" novalidate hidden>
        <p style="font-size: 13px; color: rgba(255, 255, 255, 0.5); text-align: center; margin: 0 0 16px;">Hemos enviado un código a tu correo.</p>
        <div class="loginField">
          <label class="loginField__label" for="otpCode">Código de 6 dígitos</label>
          <input class="loginField__input" id="otpCode" type="text" inputmode="numeric" placeholder="123456" required autocomplete="one-time-code" maxlength="6" />
        </div>
        <button class="loginBtn" id="verifyBtn" type="submit">Verificar y Registrar</button>
        <button type="button" id="cancelVerifyBtn" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;margin-top:8px;">Volver</button>
        <div class="loginResult" id="otpResult" aria-live="polite"></div>
      </form>

      <div class="loginCard__loader" id="loginLoader" aria-hidden="true">
        <div class="loginCard__spinner"></div>
      </div>

      <div class="loginCard__brand">V+ Puntos</div>
    </div>
  </div>

  <script>
    (() => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      const setupForm = document.getElementById('setupForm');
      const otpForm = document.getElementById('otpForm');
      const errorContainer = document.getElementById('errorContainer');
      const errorMessage = document.getElementById('errorMessage');
      const merchantNameDisplay = document.getElementById('merchantNameDisplay');

      const setupResult = document.getElementById('setupResult');
      const otpResult = document.getElementById('otpResult');
      const loaderEl = document.getElementById('loginLoader');

      let currentUsername = "";
      let currentPassword = "";
      let currentBranchName = "";

      const setResult = (el, type, msg) => {
        el.className = 'loginResult' + (type ? ` loginResult--${type}` : '');
        el.textContent = msg;
      };

      const setLoading = (on) => {
        loaderEl.classList.toggle('is-visible', on);
        loaderEl.setAttribute('aria-hidden', String(!on));
      };

      const showError = (msg) => {
        errorContainer.hidden = false;
        errorMessage.textContent = msg;
        setupForm.hidden = true;
        otpForm.hidden = true;
        merchantNameDisplay.textContent = "Error de Enlace";
      };

      if (!token) {
        showError("El enlace de registro no es válido o está incompleto.");
        return;
      }

      // Check token on load
      const checkToken = async () => {
        setLoading(true);
        try {
          const res = await fetch(`/api/merchant-setup?token=${encodeURIComponent(token)}`);
          const data = await res.json().catch(() => null);
          setLoading(false);

          if (!res.ok) {
            showError(data?.error || "El enlace ya no es válido.");
            return;
          }

          merchantNameDisplay.textContent = `Registro para ${data.name}`;
          setupForm.hidden = false;
        } catch (err) {
          setLoading(false);
          showError("Error de red. Intenta nuevamente.");
        }
      };

      checkToken();

      setupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        currentUsername = document.getElementById('username').value.trim();
        currentPassword = document.getElementById('password').value.trim();
        currentBranchName = document.getElementById('branchName').value.trim();

        if (!currentUsername || !currentPassword || !currentBranchName) {
          setResult(setupResult, 'err', 'Por favor completa todos los campos.');
          return;
        }

        if (currentPassword.length < 6) {
          setResult(setupResult, 'err', 'La contraseña debe tener al menos 6 caracteres.');
          return;
        }

        setResult(setupResult, 'info', 'Enviando código de confirmación...');
        setLoading(true);

        try {
          const res = await fetch('/api/merchant-setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'request_otp',
              token,
              username: currentUsername,
              password: currentPassword,
              branchName: currentBranchName
            })
          });

          const data = await res.json().catch(() => null);
          setLoading(false);

          if (!res.ok) {
            setResult(setupResult, 'err', data?.error || 'Error al solicitar código.');
            return;
          }

          setupForm.hidden = true;
          otpForm.hidden = false;
        } catch (err) {
          setLoading(false);
          setResult(setupResult, 'err', 'Error de red.');
        }
      });

      document.getElementById('cancelVerifyBtn').addEventListener('click', () => {
        otpForm.hidden = true;
        setupForm.hidden = false;
        setResult(otpResult, '', '');
      });

      otpForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const otpCode = document.getElementById('otpCode').value.trim();
        
        if (!otpCode) {
          setResult(otpResult, 'err', 'Ingresa el código.');
          return;
        }

        setResult(otpResult, 'info', 'Verificando y creando cuenta...');
        setLoading(true);

        try {
          const res = await fetch('/api/merchant-setup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'verify_otp',
              token,
              otp: otpCode
            })
          });

          const data = await res.json().catch(() => null);
          setLoading(false);

          if (!res.ok) {
            setResult(otpResult, 'err', data?.error || 'Código incorrecto o expirado.');
            return;
          }

          setResult(otpResult, 'ok', '¡Registro completado! Redirigiendo al acceso...');
          setTimeout(() => {
            window.location.replace('/login');
          }, 2000);
        } catch (err) {
          setLoading(false);
          setResult(otpResult, 'err', 'Error de red.');
        }
      });

    })();
  </script>
</body>
</html>
