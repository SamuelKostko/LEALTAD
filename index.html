<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Wallet de Puntos</title>

    <meta name="theme-color" content="#000000" id="themeColor" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="PWA de una sola página estilo Wallet neo-futurista." />

    <script>
      // Dynamic manifest: when visiting /card/<token>, installing the PWA should open that same card.
      (() => {
        try {
          const path = window.location.pathname || "";
          let token = "";
          if (path.startsWith("/card/")) {
            token = decodeURIComponent(path.slice("/card/".length)).trim();
          }
          if (!token) {
            const url = new URL(window.location.href);
            token = (url.searchParams.get("token") || url.searchParams.get("t") || "").trim();
          }

          const link = document.createElement("link");
          link.rel = "manifest";
          link.href = token
            ? `/api/manifest.webmanifest?token=${encodeURIComponent(token)}`
            : "/api/manifest.webmanifest";
          document.head.appendChild(link);
        } catch {
          // Ignore.
        }
      })();
    </script>

    <!-- Android/Chrome: allow standalone (installed web app) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Wallet" />

    <!-- iOS: standalone + status bar + icons -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wallet" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />

    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <div class="bg" aria-hidden="true"></div>

    <div class="app" id="app">
      <header class="header">
        <div class="header__text">
          <div class="header__greeting">Hola, <span id="greetingName">—</span></div>
          <div class="header__label">Tu Wallet de puntos</div>
        </div>

        <button class="avatar" id="profileButton" type="button" aria-label="Perfil" aria-haspopup="dialog" aria-controls="profileMenu" aria-expanded="false">
          <span class="avatar__ring" aria-hidden="true"></span>
          <span class="avatar__initials" id="avatarInitials">A</span>
        </button>
      </header>

      <main class="content" id="scroll" aria-label="Contenido">
        <section
          class="card card--client"
          aria-label="Tarjeta digital de puntos"
          role="button"
          tabindex="0"
          aria-expanded="false"
          aria-controls="cardDetails"
          id="clientCard"
        >
          <img class="card__art" src="/images/card-cliente.png" alt="Tarjeta de puntos" draggable="false" />

          <div class="card__details" id="cardDetails" aria-hidden="true">
            <div class="card__detailsTitle">Datos del cliente</div>

            <dl class="card__detailsGrid">
              <div class="card__detailsRow">
                <dt>Nombre</dt>
                <dd id="clientName">—</dd>
              </div>
              <div class="card__detailsRow">
                <dt>Cédula</dt>
                <dd id="clientId">—</dd>
              </div>
              <div class="card__detailsRow">
                <dt>Saldo disponible</dt>
                <dd id="clientBalance">0</dd>
              </div>
            </dl>
          </div>

          <div class="card__sheen" aria-hidden="true"></div>

          <div class="card__top">
            <div class="brand" aria-label="Marca">
              <div class="brand__word">SAMUEL</div>
              <div class="brand__sub">Rewards</div>
            </div>

            <div class="chip" aria-hidden="true">
              <div class="chip__inner"></div>
              <div class="chip__line chip__line--a"></div>
              <div class="chip__line chip__line--b"></div>
              <div class="chip__line chip__line--c"></div>
            </div>
          </div>

          <div class="balance">
            <div class="balance__label">Saldo de puntos</div>
            <div class="balance__value" id="points">0</div>
          </div>

          <div class="card__bottom">
            <div class="card__divider" aria-hidden="true"></div>
            <div class="card__meta" id="cardUpdated">Actualizado hoy</div>
          </div>
        </section>

        <section class="activity" aria-label="Actividad reciente">
          <div class="activity__header">
            <h2 class="activity__title">Actividad</h2>
            <button class="activity__refresh" id="activityRefresh" type="button" aria-label="Actualizar actividad">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
                <path
                  d="M20 12a8 8 0 0 1-14.3 4.9"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.9"
                />
                <path
                  d="M4 12a8 8 0 0 1 14.3-4.9"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.55"
                />
                <path
                  d="M17.8 3.8V7.6h-3.8"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.55"
                />
                <path
                  d="M6.2 20.2V16.4H10"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  opacity="0.9"
                />
              </svg>
            </button>
          </div>

          <ul class="activity__list" role="list">
          </ul>
        </section>
      </main>

      <div class="cta" aria-label="Acción principal">
        <button class="qr" id="qrButton" type="button" aria-label="Mostrar codigo QR">
          <span class="qr__glow" aria-hidden="true"></span>
          <svg class="qr__icon" viewBox="0 0 24 24" width="22" height="22" fill="none" aria-hidden="true">
            <path d="M4 4h6v6H4V4Zm10 0h6v6h-6V4ZM4 14h6v6H4v-6Zm10 4h2v2h-2v-2Zm0-4h6v2h-2v2h-2v-2h-2v-2Z" fill="currentColor" opacity="0.92" />
          </svg>
        </button>
      </div>
    </div>
    <!-- Overlay de escaneo QR -->
    <div class="scanner" id="qrScanner" aria-hidden="true">
      <div class="scanner__backdrop"></div>
      <div class="scanner__frame">
        <header class="scanner__header">
          <span class="scanner__title">Escanear código</span>
          <button class="scanner__close" id="qrClose" type="button" aria-label="Cerrar escáner">
            ✕
          </button>
        </header>

        <div class="scanner__body">
          <video id="qrVideo" class="scanner__video" playsinline></video>
          <div class="scanner__reticle" aria-hidden="true"></div>
          <canvas id="qrCanvas" class="scanner__canvas" aria-hidden="true"></canvas>
        </div>

        <footer class="scanner__footer">
          <span class="scanner__hint" id="qrHint">Apunta al código QR para escanear</span>
          <span class="scanner__result" id="qrResult" aria-live="polite"></span>
        </footer>
      </div>
    </div>

    <!-- Modal de perfil -->
    <div class="profileMenu" id="profileMenu" aria-hidden="true">
      <div class="profileMenu__backdrop" data-profile-close></div>

      <div class="profileMenu__frame" role="dialog" aria-modal="true" aria-label="Opciones de perfil">
        <header class="profileMenu__header">
          <span class="profileMenu__title">Perfil</span>
          <button class="profileMenu__close" id="profileClose" type="button" aria-label="Cerrar menú">
            ✕
          </button>
        </header>

        <div class="profileMenu__body">
          <button class="profileMenu__item" id="installPwa" type="button">
            Instalar la app
          </button>
          <div class="profileMenu__hint" id="installHint" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <!-- Librería ligera de decodificación QR -->
    <script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js" crossorigin="anonymous"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
