<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Wallet NEXUS</title>

    <meta name="theme-color" content="#000000" id="themeColor" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="WALLET DE NEXUS." />

    <script>
      // Dynamic manifest: when visiting /card/<token>, installing the PWA should open that same card.
      (() => {
        try {
          const path = window.location.pathname || "";
          let token = "";
          if (path.startsWith("/card/")) {
            token = decodeURIComponent(path.slice("/card/".length)).trim();
          }
          if (!token) {
            const url = new URL(window.location.href);
            token = (url.searchParams.get("token") || url.searchParams.get("t") || "").trim();
          }

          const link = document.createElement("link");
          link.rel = "manifest";
          link.href = token
            ? `/api/manifest.webmanifest?token=${encodeURIComponent(token)}`
            : "/api/manifest.webmanifest";
          document.head.appendChild(link);
        } catch {
          // Ignore.
        }
      })();
    </script>

    <!-- Android/Chrome: allow standalone (installed web app) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Wallet NEXUS" />

    <!-- iOS: standalone + status bar + icons -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wallet NEXUS" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />

    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <div class="bg" aria-hidden="true"></div>

    <div class="app" id="app">
      <header class="header">
        <div class="header__text">
          <div class="header__greeting">Hola, <span id="greetingName">—</span></div>
          <div class="header__label" id="headerLabel">Tu Wallet de puntos</div>
        </div>

        <div class="adminHeaderActions">
          <button class="adminHeaderAction" id="adminHeaderGoQr" type="button" hidden>CREAR TRANSACCION</button>
          <button class="adminHeaderAction adminHeaderAction--ghost" id="adminLogout" type="button" hidden>CERRAR SESION</button>
        </div>
      </header>

      <main class="content" id="scroll" aria-label="Contenido">
        <section class="adminCard" id="adminRootLogin" hidden aria-label="Acceso admin">
          <div class="adminCard__title">Acceso</div>
          <p class="adminCard__hint">Ingresa tu password para acceder al panel.</p>

          <form class="adminForm" id="adminRootLoginForm">
            <label class="adminField">
              <span class="adminField__label">Password</span>
              <input class="adminField__input" id="adminRootPassword" type="password" autocomplete="current-password" placeholder="Tu password admin" required />
            </label>

            <div class="adminActions">
              <button class="adminButton" id="adminRootLoginBtn" type="submit">Entrar</button>
            </div>

            <div class="adminResult" id="adminRootLoginResult" aria-live="polite"></div>
          </form>
        </section>

        <section class="adminCard" id="adminRootClients" hidden aria-label="Clientes">
          <div class="adminCard__title">Clientes</div>
          <p class="adminCard__hint">Selecciona un cliente para ver sus transacciones.</p>
          <div class="adminForm" id="adminClientsList">
            <label class="adminField">
              <span class="adminField__label">Cliente</span>
              <select class="adminField__input" id="adminClientSelect" aria-label="Seleccionar cliente">
                <option value="">Cargando...</option>
              </select>
            </label>
          </div>
          <div class="adminResult" id="adminClientsResult" aria-live="polite"></div>
        </section>

        <section class="adminCard" id="adminRootCardTx" hidden aria-label="Transacciones de tarjeta">
          <div class="adminCard__title">Transacciones de tarjeta</div>
          <p class="adminCard__hint" id="adminCardTxHint">Selecciona un cliente.</p>
          <div class="adminForm" id="adminCardTxList"></div>
          <div class="adminResult" id="adminCardTxResult" aria-live="polite"></div>
        </section>

        <section class="adminCard" id="adminRootAllTx" hidden aria-label="Transacciones generales">
          <div class="adminCard__title">Transacciones</div>
          <p class="adminCard__hint">Listado general (reciente).</p>
          <div class="adminActions">
            <button class="adminButton adminButton--wide" id="adminTxRefresh" type="button">Recargar</button>
          </div>
          <div class="adminForm" id="adminTxList"></div>
          <div class="adminResult" id="adminTxResult" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
