<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <title>Admin · Enviar correo</title>

    <meta name="theme-color" content="#000000" id="themeColor" />
    <meta name="color-scheme" content="light dark" />
    <meta name="description" content="Panel admin para enviar correo de activación" />

    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>

  <body>
    <div class="bg" aria-hidden="true"></div>

    <div class="app admin" id="app">
      <header class="header">
        <div class="header__text">
          <div class="header__greeting">Admin</div>
          <div class="header__label">Enviar correo de activación</div>
        </div>

        <a class="admin__back" href="/" aria-label="Volver al wallet">Volver</a>
      </header>

      <main class="content admin__content" aria-label="Panel">
        <section class="adminCard" aria-label="Formulario de correo">
          <div class="adminCard__title">Datos del envío</div>
          <p class="adminCard__hint">Usa tu <strong>ADMIN_KEY</strong> para autorizar el envío. No se guarda en el navegador.</p>

          <form class="adminForm" id="emailForm">
            <label class="adminField">
              <span class="adminField__label">ADMIN_KEY</span>
              <input class="adminField__input" id="adminKey" type="password" autocomplete="off" placeholder="devkey / change-me" required />
            </label>

            <label class="adminField">
              <span class="adminField__label">Email destino</span>
              <input class="adminField__input" id="toEmail" type="email" inputmode="email" autocomplete="off" placeholder="cliente@correo.com" required />
            </label>

            <div class="adminGrid">
              <label class="adminField">
                <span class="adminField__label">Nombre</span>
                <input class="adminField__input" id="clientName" type="text" autocomplete="off" placeholder="SAMUEL KOSTKO" />
              </label>

              <label class="adminField">
                <span class="adminField__label">Cédula</span>
                <input class="adminField__input" id="clientCedula" type="text" autocomplete="off" placeholder="V-30547862" />
              </label>
            </div>

            <div class="adminGrid">
              <label class="adminField">
                <span class="adminField__label">Saldo / Puntos</span>
                <input class="adminField__input" id="clientBalance" type="number" inputmode="numeric" min="0" step="1" placeholder="0" />
              </label>

              <label class="adminField">
                <span class="adminField__label">Token (si ya existe)</span>
                <input class="adminField__input" id="cardToken" type="text" autocomplete="off" placeholder="I-GAnCksV2RuxdZQRYiLCg" />
              </label>
            </div>

            <div class="adminActions">
              <button class="adminButton" id="sendBtn" type="submit">Enviar correo</button>
              <button class="adminButton adminButton--ghost" id="copyBtn" type="button" disabled>Copiar link</button>
            </div>

            <div class="adminResult" id="result" aria-live="polite"></div>
          </form>
        </section>

        <section class="adminCard" aria-label="Ayuda">
          <div class="adminCard__title">Cómo funciona</div>
          <ul class="adminList">
            <li>Si colocas <strong>Token</strong>, se envía el link de esa tarjeta.</li>
            <li>Si <strong>Token</strong> está vacío, se crea una tarjeta con Nombre/Cédula/Saldo y luego se envía.</li>
          </ul>
        </section>
      </main>
    </div>

    <script src="/admin-email.js" defer></script>
  </body>
</html>
