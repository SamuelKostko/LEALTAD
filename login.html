<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Acceso · V+ Puntos</title>

  <meta name="theme-color" content="#09090b" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Panel de acceso para administradores y comercios V+ Puntos" />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" href="/icons/icon-v2.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />

  <style>
    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #09090b;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ── Full-page centered layout ── */
    .loginPage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      /* Subtle radial background */
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(99, 102, 241, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 55% 45% at 80% 70%, rgba(139, 92, 246, 0.10) 0%, transparent 70%),
        #09090b;
    }

    /* ── Login card ── */
    .loginCard {
      width: min(420px, 100%);
      background: #111113;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 24px;
      padding: 40px 32px 44px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04),
        0 32px 80px rgba(0, 0, 0, 0.7),
        0 4px 16px rgba(0, 0, 0, 0.4);
      animation: cardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Logo area ── */
    .loginCard__logo {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .loginCard__logoCircle {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.22) 0%, rgba(139, 92, 246, 0.15) 100%);
      border: 1px solid rgba(99, 102, 241, 0.3);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px rgba(99, 102, 241, 0.2);
    }

    /* ── Heading ── */
    .loginCard__title {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      letter-spacing: -0.4px;
    }

    .loginCard__sub {
      margin: 0 0 32px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.38);
      text-align: center;
    }

    /* ── Form fields ── */
    .loginForm {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .loginField {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .loginField__label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .loginField__input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 14px 16px;
      color: #fff;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      transition: border-color 150ms, box-shadow 150ms, background 150ms;
      box-sizing: border-box;
    }

    .loginField__input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .loginField__input:focus {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
    }

    /* ── Submit button ── */
    .loginBtn {
      margin-top: 4px;
      width: 100%;
      padding: 15px 20px;
      background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.1px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 140ms, transform 100ms;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
    }

    .loginBtn:hover {
      opacity: 0.92;
    }

    .loginBtn:active {
      transform: scale(0.98);
    }

    .loginBtn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* ── Result message ── */
    .loginResult {
      min-height: 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.38);
      text-align: center;
      line-height: 1.4;
      word-break: break-word;
    }

    .loginResult--ok {
      color: #4ade80;
    }

    .loginResult--err {
      color: #f87171;
    }

    .loginResult--info {
      color: #60a5fa;
    }

    /* ── Loading spinner overlay ── */
    .loginCard__loader {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 24px;
      background: rgba(17, 17, 19, 0.7);
      backdrop-filter: blur(2px);
      place-items: center;
    }

    .loginCard__loader.is-visible {
      display: grid;
    }

    .loginCard__spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Brand footer ── */
    .loginCard__brand {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.18);
    }
  </style>
</head>

<body>
  <div class="loginPage">
    <div class="loginCard" style="position: relative;" id="loginCard">

      <!-- Logo -->
      <div class="loginCard__logo">
        <div class="loginCard__logoCircle">
          <img src="/icons/icon-v2.svg" width="28" height="28" alt="Logo V+ Puntos" style="object-fit: contain;" />
        </div>
      </div>

      <h1 class="loginCard__title">Bienvenido</h1>
      <p class="loginCard__sub">V+ Puntos · Panel de gestión</p>

      <form class="loginForm" id="loginForm" autocomplete="on" novalidate>
        <div class="loginField">
          <label class="loginField__label" for="username">Usuario</label>
          <input class="loginField__input" id="username" name="username" type="text" autocomplete="username"
            placeholder="" required />
        </div>

        <div class="loginField">
          <label class="loginField__label" for="password">Contraseña</label>
          <input class="loginField__input" id="password" name="password" type="password" autocomplete="current-password"
            placeholder="••••••••" required />
        </div>

        <button class="loginBtn" id="loginBtn" type="submit">Entrar</button>
        <button type="button" id="forgotBtn" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;margin-top:8px;text-decoration:underline;">¿Olvidaste la clave?</button>

        <div class="loginResult" id="loginResult" aria-live="polite" role="status"></div>
      </form>

      <!-- Forgot Password Form -->
      <form class="loginForm" id="forgotForm" autocomplete="off" novalidate hidden>
        <p style="font-size: 13px; color: rgba(255, 255, 255, 0.5); text-align: center; margin: 0 0 16px;">Ingresa el correo configurado para recuperar tu acceso.</p>
        <div class="loginField">
          <label class="loginField__label" for="forgotEmail">Usuario / Correo</label>
          <input class="loginField__input" id="forgotEmail" type="text" placeholder="tucorreo@ejemplo.com" required />
        </div>
        <button class="loginBtn" id="sendForgotBtn" type="submit">Enviar código</button>
        <button type="button" id="cancelForgotBtn" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;margin-top:8px;">Volver</button>
        <div class="loginResult" id="forgotResult" aria-live="polite" role="status"></div>
      </form>

      <!-- Verify Code Form -->
      <form class="loginForm" id="verifyForm" autocomplete="off" novalidate hidden>
        <p style="font-size: 13px; color: rgba(255, 255, 255, 0.5); text-align: center; margin: 0 0 16px;">Código enviado. Ingrésalo para continuar.</p>
        <div class="loginField">
          <label class="loginField__label" for="verifyCode">Código de 6 dígitos</label>
          <input class="loginField__input" id="verifyCode" type="text" inputmode="numeric" placeholder="123456" required autocomplete="one-time-code" maxlength="6" />
        </div>
        <button class="loginBtn" id="verifyBtn" type="submit">Validar código</button>
        <button type="button" id="cancelVerifyBtn" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;margin-top:8px;">Cancelar</button>
        <div class="loginResult" id="verifyResult" aria-live="polite" role="status"></div>
      </form>

      <!-- Reset Password Form -->
      <form class="loginForm" id="resetForm" autocomplete="off" novalidate hidden>
        <p style="font-size: 13px; color: rgba(255, 255, 255, 0.5); text-align: center; margin: 0 0 16px;">Código validado. Crea una nueva contraseña.</p>
        <div class="loginField">
          <label class="loginField__label" for="newPassword">Nueva contraseña</label>
          <input class="loginField__input" id="newPassword" type="password" placeholder="Mínimo 6 caracteres" required minlength="6" />
        </div>
        <button class="loginBtn" id="updatePasswordBtn" type="submit">Actualizar clave</button>
        <div class="loginResult" id="resetResult" aria-live="polite" role="status"></div>
      </form>

      <!-- Spinner overlay -->
      <div class="loginCard__loader" id="loginLoader" aria-hidden="true">
        <div class="loginCard__spinner"></div>
      </div>

      <div class="loginCard__brand">V+ Puntos</div>
    </div>
  </div>

  <script>
    (() => {
      const loginForm = document.getElementById('loginForm');
      const forgotForm = document.getElementById('forgotForm');
      const verifyForm = document.getElementById('verifyForm');
      const resetForm = document.getElementById('resetForm');

      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const forgotEmailEl = document.getElementById('forgotEmail');
      const verifyCodeEl = document.getElementById('verifyCode');
      const newPasswordEl = document.getElementById('newPassword');

      const loginResultEl = document.getElementById('loginResult');
      const forgotResultEl = document.getElementById('forgotResult');
      const verifyResultEl = document.getElementById('verifyResult');
      const resetResultEl = document.getElementById('resetResult');

      const loaderEl = document.getElementById('loginLoader');

      let currentValidCode = "";

      const setResult = (el, type, msg) => {
        el.className = 'loginResult' + (type ? ` loginResult--${type}` : '');
        el.textContent = msg;
      };

      const setLoading = (on) => {
        loaderEl.classList.toggle('is-visible', on);
        loaderEl.setAttribute('aria-hidden', String(!on));
      };

      const showStep = (step) => {
        loginForm.hidden = step !== 'login';
        forgotForm.hidden = step !== 'forgot';
        verifyForm.hidden = step !== 'verify';
        resetForm.hidden = step !== 'reset';
      };

      const clearResults = () => {
        setResult(loginResultEl, '', '');
        setResult(forgotResultEl, '', '');
        setResult(verifyResultEl, '', '');
        setResult(resetResultEl, '', '');
      };

      document.getElementById('forgotBtn').addEventListener('click', () => {
        clearResults();
        showStep('forgot');
      });

      document.getElementById('cancelForgotBtn').addEventListener('click', () => {
        clearResults();
        showStep('login');
      });

      document.getElementById('cancelVerifyBtn').addEventListener('click', () => {
        clearResults();
        showStep('login');
      });

      // If already authenticated, redirect immediately
      const checkExisting = async () => {
        try {
          const res = await fetch('/api/admin/me', { cache: 'no-store', credentials: 'include' });
          const data = await res.json().catch(() => null);
          if (data?.authenticated) redirect(String(data.role || '').toLowerCase());
        } catch { /* ignore */ }
      };

      const redirect = (role) => {
        if (role === 'merchant') {
          window.location.replace('/comercio/qr');
        } else if (role === 'cashier') {
          window.location.replace('/admin/qr');
        } else {
          // admin, or unknown → main admin panel
          window.location.replace('/admin');
        }
      };

      // Check on load (don't await — let the form render first)
      checkExisting();

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = usernameEl.value.trim();
        const password = passwordEl.value.trim();

        if (!username || !password) {
          setResult(loginResultEl, 'err', 'Por favor completa todos los campos.');
          return;
        }

        setResult(loginResultEl, 'info', 'Verificando credenciales…');
        setLoading(true);

        try {
          const res = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username, password })
          });

          const data = await res.json().catch(() => null);

          if (!res.ok) {
            setResult(loginResultEl, 'err', data?.error || data?.message || `Error (${res.status})`);
            setLoading(false);
            return;
          }

          setResult(loginResultEl, 'ok', 'Acceso concedido. Redirigiendo…');

          // Ask /me what role was assigned
          const meRes = await fetch('/api/admin/me', { cache: 'no-store', credentials: 'include' });
          const meData = await meRes.json().catch(() => null);
          const role = String(meData?.role || '').toLowerCase();

          redirect(role);
        } catch {
          setResult(loginResultEl, 'err', 'Fallo de conexión. Intenta de nuevo.');
          setLoading(false);
        }
      });

      forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = forgotEmailEl.value.trim();
        if (!email) return;

        setResult(forgotResultEl, 'info', 'Enviando código…');
        setLoading(true);
        try {
          const res = await fetch('/api/admin/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const data = await res.json().catch(() => null);
          setLoading(false);

          if (!res.ok) {
            setResult(forgotResultEl, 'err', data?.error || 'Correo incorrecto.');
            return;
          }

          setResult(forgotResultEl, 'ok', 'Correo enviado. Revisa tu bandeja.');
          setTimeout(() => showStep('verify'), 1500);
        } catch {
          setLoading(false);
          setResult(forgotResultEl, 'err', 'Error de red.');
        }
      });

      verifyForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = verifyCodeEl.value.trim();
        if (!code) return;

        setResult(verifyResultEl, 'info', 'Verificando…');
        setLoading(true);
        try {
          const res = await fetch('/api/admin/verify-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code })
          });
          const data = await res.json().catch(() => null);
          setLoading(false);

          if (!res.ok) {
            setResult(verifyResultEl, 'err', data?.error || 'Código incorrecto.');
            return;
          }

          setResult(verifyResultEl, 'ok', 'Código correcto.');
          currentValidCode = code;
          setTimeout(() => showStep('reset'), 1000);
        } catch {
          setLoading(false);
          setResult(verifyResultEl, 'err', 'Error de red.');
        }
      });

      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = newPasswordEl.value.trim();
        if (!newPassword || newPassword.length < 6) {
          setResult(resetResultEl, 'err', 'Clave muy corta.');
          return;
        }

        setResult(resetResultEl, 'info', 'Actualizando…');
        setLoading(true);
        try {
          const res = await fetch('/api/admin/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: currentValidCode, newPassword })
          });
          const data = await res.json().catch(() => null);
          setLoading(false);

          if (!res.ok) {
            setResult(resetResultEl, 'err', data?.error || 'Error al actualizar.');
            return;
          }

          setResult(resetResultEl, 'ok', '¡Clave actualizada! Redirigiendo al login…');
          setTimeout(() => {
            clearResults();
            showStep('login');
          }, 2000);
        } catch {
          setLoading(false);
          setResult(resetResultEl, 'err', 'Error de red.');
        }
      });
    })();
  </script>
</body>
</html>
